# Render Blueprint - Galelugi Peças
# Config de produção em config/production.py — não precisa preencher Environment no painel.

services:
  - type: web
    name: galelugi
    runtime: python
    region: oregon

    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm ci && npm run build
      cd ..
      python -c "from pathlib import Path; assert Path('frontend/dist/index.html').is_file(), 'Frontend build falhou'"
      DJANGO_SETTINGS_MODULE=config.production python manage.py collectstatic --noinput
      DJANGO_SETTINGS_MODULE=config.production python manage.py migrate --noinput

    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: galelugi-db
          property: connectionString

databases:
  - name: galelugi-db
    plan: free
    region: oregon

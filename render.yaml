# Render Blueprint - Galelugi Peças
# API + loja React no MESMO serviço → FRONTEND_URL e BACKEND_URL iguais

services:
  - type: web
    name: galelugi-pecas
    runtime: python
    region: oregon

    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm ci && npm run build
      cd ..
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput

    startCommand: gunicorn config.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "False"
      - key: SERVE_REACT_SPA
        value: "true"
      - key: ALLOWED_HOSTS
        value: galelugi.com.br,www.galelugi.com.br,galelugi-pecas.onrender.com
      - key: FRONTEND_URL
        value: https://galelugi-pecas.onrender.com
      - key: BACKEND_URL
        value: https://galelugi-pecas.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://galelugi.com.br,https://www.galelugi.com.br,https://galelugi-pecas.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://galelugi.com.br,https://www.galelugi.com.br,https://galelugi-pecas.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: galelugi-db
          property: connectionString

databases:
  - name: galelugi-db
    plan: free
    region: oregon

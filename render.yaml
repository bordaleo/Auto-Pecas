# Render Blueprint - AutoPeças Sandroni
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: autopecas-sandroni
    runtime: python
    region: oregon

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput

    startCommand: gunicorn config.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: autopecassandroni.com.br,www.autopecassandroni.com.br,autopecas-sandroni.onrender.com
      - key: FRONTEND_URL
        value: https://autopecassandroni.com.br
      - key: BACKEND_URL
        value: https://autopecassandroni.com.br
      - key: CSRF_TRUSTED_ORIGINS
        value: https://autopecassandroni.com.br,https://www.autopecassandroni.com.br,https://autopecas-sandroni.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://autopecassandroni.com.br,https://www.autopecassandroni.com.br,https://autopecas-sandroni.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sandroni-db
          property: connectionString
      # Configure no painel Render: BREVO_API_KEY, SMTP_FROM_EMAIL, MERCADOPAGO_*, CLOUDINARY_*

databases:
  - name: sandroni-db
    plan: free
    region: oregon
